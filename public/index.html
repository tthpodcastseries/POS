<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TTH POS">
  <meta name="theme-color" content="#140038">
  <link rel="manifest" href="/manifest.json">
  <title>TTH Podcast Series - POS</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header>
      <h1>TTH Podcast Series</h1>
      <div class="header-actions">
        <button id="reportBtn" class="icon-btn" aria-label="Sales report">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        </button>
        <button id="historyBtn" class="icon-btn" aria-label="Transaction history">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>
        </button>
      </div>
    </header>

    <!-- Main checkout screen -->
    <main id="checkoutScreen">

      <!-- Raffle Tickets -->
      <div class="product-section">
        <div class="section-title">Raffle Tickets</div>
        <div class="product-grid grid-4">
          <button class="product-btn" data-product="Raffle Ticket" data-qty="1" data-price="5">
            <span class="qty">1</span>
            <span class="price">$5</span>
          </button>
          <button class="product-btn" data-product="Raffle Tickets" data-qty="5" data-price="20">
            <span class="qty">5</span>
            <span class="price">$20</span>
          </button>
          <button class="product-btn" data-product="Raffle Tickets" data-qty="15" data-price="50">
            <span class="qty">15</span>
            <span class="price">$50</span>
          </button>
          <button class="product-btn" data-product="Raffle Tickets" data-qty="35" data-price="100">
            <span class="qty">35</span>
            <span class="price">$100</span>
          </button>
        </div>
      </div>

      <!-- 50/50 Tickets -->
      <div class="product-section">
        <div class="section-title">50/50 Tickets</div>
        <div class="product-grid grid-4">
          <button class="product-btn" data-product="50/50 Ticket" data-qty="1" data-price="5">
            <span class="qty">1</span>
            <span class="price">$5</span>
          </button>
          <button class="product-btn" data-product="50/50 Tickets" data-qty="5" data-price="20">
            <span class="qty">5</span>
            <span class="price">$20</span>
          </button>
          <button class="product-btn" data-product="50/50 Tickets" data-qty="15" data-price="50">
            <span class="qty">15</span>
            <span class="price">$50</span>
          </button>
          <button class="product-btn" data-product="50/50 Tickets" data-qty="35" data-price="100">
            <span class="qty">35</span>
            <span class="price">$100</span>
          </button>
        </div>
      </div>

      <!-- Tickets -->
      <div class="product-section">
        <div class="section-title">Event Tickets</div>
        <div class="product-grid ticket-grid">
          <button class="product-btn" data-product="Early Bird Ticket" data-qty="1" data-price="20">
            <span class="qty">Early Bird</span>
            <span class="price">$20</span>
            <span class="remaining" id="inv-Early Bird Ticket"></span>
          </button>
          <button class="product-btn" data-product="GA Ticket" data-qty="1" data-price="25">
            <span class="qty">GA</span>
            <span class="price">$25</span>
            <span class="remaining" id="inv-GA Ticket"></span>
          </button>
        </div>
        <div class="door-row">
          <button class="door-btn" id="addDoorTicket">
            <span class="label">Door</span>
            <span class="price">$30</span>
            <span class="remaining" id="inv-Door Ticket"></span>
          </button>
          <div class="qty-selector">
            <button class="qty-btn" id="doorMinus">-</button>
            <span class="qty-value" id="doorQty">1</span>
            <button class="qty-btn" id="doorPlus">+</button>
          </div>
        </div>
      </div>

      <!-- Cart -->
      <div class="cart-section">
        <div class="cart-summary" id="cartSummary">
          <div class="cart-empty" id="cartEmpty">No items yet</div>
          <div id="cartItems"></div>
          <div class="cart-total" id="cartTotal" style="display:none">
            <span class="cart-total-label">Total</span>
            <span class="cart-total-amount" id="totalAmount">$0.00</span>
          </div>
        </div>

        <div class="action-buttons">
          <button id="clearCartBtn" class="btn btn-clear" disabled>
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14"/></svg>
          </button>
          <button id="cashBtn" class="btn btn-cash" disabled>
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
            Cash
          </button>
          <button id="chargeCardBtn" class="btn btn-primary" disabled>
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            Card
          </button>
        </div>
      </div>
    </main>

    <!-- Card payment modal -->
    <div id="paymentModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Card Payment</h2>
          <button id="closePayment" class="close-btn">&times;</button>
        </div>
        <div class="modal-amount">$<span id="modalAmount">0.00</span></div>
        <div id="card-container"></div>
        <div id="card-errors" class="error-text"></div>
        <button id="payBtn" class="btn btn-primary btn-full">Pay Now</button>
      </div>
    </div>

    <!-- Cash confirmation modal -->
    <div id="cashModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Cash Payment</h2>
          <button id="closeCash" class="close-btn">&times;</button>
        </div>
        <div class="modal-amount">$<span id="cashAmount">0.00</span></div>
        <p class="cash-confirm-text">Confirm cash received?</p>
        <button id="confirmCashBtn" class="btn btn-cash btn-full">Confirm Cash Received</button>
      </div>
    </div>


    <!-- Email modal (for 50/50 tickets) -->
    <div id="emailModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Buyer Email</h2>
          <button id="closeEmail" class="close-btn">&times;</button>
        </div>
        <p class="email-note">Email required for 50/50 ticket numbers</p>
        <input type="email" id="buyerEmail" class="email-input" placeholder="email@example.com" autocomplete="email" inputmode="email">
        <div id="email-errors" class="error-text"></div>
        <button id="confirmEmailBtn" class="btn btn-primary btn-full">Continue to Payment</button>
      </div>
    </div>

    <!-- Success overlay -->
    <div id="successOverlay" class="overlay hidden">
      <div class="success-content">
        <svg width="80" height="80" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"><circle cx="40" cy="40" r="36"/><path d="M24 40l10 10 22-22"/></svg>
        <h2>Payment Successful</h2>
        <p id="successAmount"></p>
        <p id="successMethod" class="success-method"></p>
        <div id="successTickets" class="success-tickets" style="display:none">
          <p class="tickets-label">50/50 Ticket Numbers:</p>
          <div id="ticketNumberList" class="ticket-numbers"></div>
          <p id="emailSentNote" class="email-sent-note"></p>
        </div>
        <button id="newSaleBtn" class="btn btn-primary btn-full">New Sale</button>
      </div>
    </div>

    <!-- Transaction history screen -->
    <div id="historyScreen" class="screen hidden">
      <header>
        <button id="backBtn" class="icon-btn" aria-label="Back">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h1>History</h1>
        <div style="width:38px"></div>
      </header>
      <div id="transactionList" class="transaction-list">
        <p class="loading">Loading...</p>
      </div>
    </div>

    <!-- Report screen -->
    <div id="reportScreen" class="screen hidden">
      <header>
        <button id="reportBackBtn" class="icon-btn" aria-label="Back">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h1>Sales Report</h1>
        <div style="width:38px"></div>
      </header>
      <div class="report-content" id="reportContent">
        <p class="loading">Loading...</p>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
